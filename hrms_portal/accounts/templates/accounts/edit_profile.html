{% extends 'layouts/base.html' %}

{% block title %}Modify Employee Profile{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-6 flex items-center gap-2">
        <a href="{% url 'staff_directory' %}" class="text-xs font-semibold text-slate-400 hover:text-slate-600 transition-colors bg-slate-100 px-2.5 py-1.5 rounded-lg"><i class="fa-solid fa-arrow-left"></i> Back to Directory</a>
    </div>

    <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
        <div class="border-b border-slate-100 pb-4 mb-6">
            <h2 class="text-xl font-bold text-slate-900 flex items-center gap-2">
                <i class="fa-solid fa-user-pen text-blue-500"></i> Modify Profile Settings
            </h2>
            <p class="text-slate-400 text-xs mt-0.5">Update access names, department scopes, and structural identifiers for {{ edit_user.username }}.</p>
        </div>

        <form method="POST" class="grid grid-cols-2 gap-4">
            {% csrf_token %}
            <div class="col-span-2">
                <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Username</label>
                <input type="text" name="username" value="{{ edit_user.username }}" required class="w-full px-3 py-2 text-sm bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500">
            </div>
            <div class="col-span-2">
                <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Email Address</label>
                <input type="email" name="email" value="{{ edit_user.email }}" required class="w-full px-3 py-2 text-sm bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Employee ID</label>
                <input type="text" name="employee_id" value="{{ profile.employee_id|default:'' }}" required class="w-full px-3 py-2 text-sm bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Department</label>
                <select name="department" class="w-full px-3 py-2 text-sm bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500">
                    <option value="">Unassigned</option>
                    {% for dept in departments %}
                        <option value="{{ dept.id }}" {% if profile.department.id == dept.id %}selected{% endif %}>{{ dept.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Designation</label>
                <input type="text" name="designation" value="{{ profile.designation|default:'' }}" class="w-full px-3 py-2 text-sm bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Monthly Salary</label>
                <input type="number" name="salary" value="{{ profile.salary|default:0 }}" class="w-full px-3 py-2 text-sm bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-500">
            </div>
            
            <div class="col-span-2 flex items-center justify-end gap-3 border-t border-slate-100 pt-4 mt-4">
                <a href="{% url 'staff_directory' %}" class="px-4 py-2 text-sm font-semibold text-slate-500 bg-slate-100 hover:bg-slate-200 rounded-lg transition-all">Cancel</a>
                <button type="submit" class="px-5 py-2 text-sm font-semibold bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-all shadow-sm">Save Changes</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
