<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Secure Core System Verification | HRMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-slate-900 flex min-h-full flex-col justify-center px-6 py-12 lg:px-8 items-center h-screen">
    <div class="sm:mx-auto sm:w-full sm:max-w-sm bg-slate-800 p-8 rounded-2xl border border-slate-700/50 shadow-xl">
        <div class="text-center mb-6">
            <div
                class="w-12 h-12 bg-amber-500/10 rounded-xl flex items-center justify-center text-amber-400 mx-auto text-xl border border-amber-500/20 mb-3">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <h2 class="text-xl font-bold text-white tracking-tight">Two-Factor Authentication</h2>
            <p class="text-slate-400 text-xs mt-1">Please enter the 6-digit verification code token sent to your company
                inbox address.</p>
        </div>

        {% if messages %}
        {% for message in messages %}
        <div
            class="p-3 mb-4 rounded-lg text-xs font-medium {% if message.tags == 'error' %}bg-red-500/10 text-red-400 border border-red-500/20{% else %}bg-blue-500/10 text-blue-400 border border-blue-500/20{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}

        <form class="space-y-4" method="POST" action="{% url 'verify_otp' %}">
            {% csrf_token %}
            <div>
                <label for="otp_token"
                    class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">6-Digit
                    Verification Token</label>
                <div class="relative">
                    <i class="fa-solid fa-key absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                    <input id="otp_token" name="otp_token" type="text" maxlength="6" required placeholder="000000"
                        class="w-full pl-9 pr-4 py-2.5 bg-slate-900/50 border border-slate-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-white font-mono text-center tracking-widest text-lg focus:border-transparent">
                </div>
            </div>

            <button type="submit"
                class="w-full py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-xl transition-all shadow-md text-sm flex items-center justify-center gap-2 mt-2">
                <i class="fa-solid fa-unlock-keyhole"></i> Verify & Authenticate
            </button>
        </form>
    </div>
</body>

</html>
