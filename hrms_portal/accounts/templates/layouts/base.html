<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HRMS Portal{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans antialiased text-gray-900">

    <div class="min-h-screen flex flex-col md:flex-row">
        <aside class="w-full md:w-64 bg-slate-900 text-slate-100 flex flex-col px-4 py-6 shadow-xl">
            <div class="flex items-center gap-3 px-2 mb-8">
                <i class="fa-solid fa-people-roof text-blue-400 text-2xl"></i>
                <span class="text-xl font-bold tracking-wider text-white">HRMS Portal</span>
            </div>
            
            <nav class="flex-1 space-y-2">
               {% block sidebar_links %}
                    <a href="{% url 'hr_dashboard' %}" class="flex items-center gap-3 px-3 py-2 bg-slate-800 text-white rounded-lg font-medium">
                        <i class="fa-solid fa-chart-pie text-blue-400"></i><span>Analytics Console</span>
                    </a>
                    <a href="{% url 'staff_directory' %}" class="flex items-center gap-3 px-3 py-2 text-slate-300 hover:bg-slate-800 hover:text-white rounded-lg transition-all">
                        <i class="fa-solid fa-users"></i><span>Staff Directory</span>
                    </a>
                {% endblock %}
            </nav>

            <div class="pt-4 border-t border-slate-700 mt-auto">
                <div class="flex items-center gap-3 px-2 mb-4">
                    <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center font-bold text-white uppercase">
                        {{ request.user.username|slice:":2" }}
                    </div>
                    <div class="text-sm">
                        <p class="font-medium text-slate-200 truncate">{{ request.user.username }}</p>
                        <p class="text-xs text-slate-400">{% if request.user.is_hr %}HR Admin{% else %}Employee{% endif %}</p>
                    </div>
                </div>
                <form action="{% url 'logout' %}" method="post" class="w-full">
                    {% csrf_token %}
                    <button type="submit" class="w-full flex items-center gap-3 px-3 py-2 text-sm text-rose-400 hover:bg-slate-800 rounded-lg transition-all duration-150">
                        <i class="fa-solid fa-right-from-bracket"></i>
                        <span>Secure Sign Out</span>
                    </button>
                </form>
            </div>
        </aside>

        <main class="flex-1 p-6 md:p-10 overflow-y-auto">
            {% block content %}
            {% endblock %}
        </main>
    </div>

</body>
</html>
